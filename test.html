<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title></head>
<body style="background:white; color:black; font-family:sans-serif; padding:20px; font-size:18px;">
<h1 style="color:green;">✓ 如果你看到這個綠字，瀏覽器和網路都正常</h1>
<p>裝置資訊：</p>
<pre id="ua" style="background:#eee; padding:10px; word-wrap:break-word; white-space:pre-wrap;"></pre>
<p>下一步：</p>
<button style="font-size:18px; padding:15px;" onclick="
  // 強制清除這個網站的 service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => {
      let n = rs.length;
      Promise.all(rs.map(r => r.unregister())).then(() => {
        document.getElementById('msg').textContent = '✓ 已清除 ' + n + ' 個 Service Worker。請現在重新整理 index.html';
      });
    });
  } else {
    document.getElementById('msg').textContent = '此瀏覽器沒有 Service Worker';
  }
">清除 Service Worker</button>
<p id="msg" style="color:red; font-weight:bold;"></p>
<hr>
<p><a href="./index.html">→ 嘗試開啟 index.html</a></p>
<script>
document.getElementById('ua').textContent = navigator.userAgent + '\n\nlocalStorage: ' + (typeof localStorage !== 'undefined' ? 'OK' : 'NONE');
</script>
</body></html>
